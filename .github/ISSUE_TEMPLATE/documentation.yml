name: Documentation
description: Questions about setup, architecture, Cedar policy, or contributor workflow.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: textarea
    id: question
    attributes:
      label: What do you need help understanding?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: What have you already tried?
      placeholder: |
        Docs read:
        Commands run:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Quick start / local dev
        - Cedar policy / policy.cedar
        - Admin dashboard
        - Secure gateway / MCP
        - Docker / CI
        - Other
