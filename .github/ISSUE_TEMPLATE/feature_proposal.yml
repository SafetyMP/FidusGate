name: Feature proposal
description: Suggest a capability for the reference implementation.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What agent-governance gap does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This fits FidusGate as a reference/demo (not production product scope)
          required: true
