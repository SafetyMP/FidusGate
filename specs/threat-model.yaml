schema: threat-model/v1
product: FidusGate
updated: "2026-07-18"

cells:
  - id: integration_smoke_main_root
    method: EXEC
    path: ./scripts/integration-smoke.sh
    principals: [parent_on_main_root]
    auth_mechanism: cwd_main_root
    trust_boundary: not_from_worktree
    establishment_failure: "exit 1 from worktree cwd"

  - id: mcp_streamable_http_header_consistency
    method: EXEC
    path: ./scripts/check-mcp-protocol.sh
    principals: [gateway_operator]
    auth_mechanism: header_body_agreement
    trust_boundary: mcp_streamable_http
    establishment_failure: "header/body desync or dual-era protocol regression"
    owasp: [MCP07, MCP03]
    baseline: true

deny_cases:
  - id: integration_from_worktree_denied
    cell: integration_smoke_main_root
    principal: agent_worktree
    fixture:
      # Runner nests to .worktrees/adversarial-probe-<pid> and invokes the cell
      # path as an absolute script under repo root (never cwd-relative).
      cwd: .worktrees
    expect:
      status: 1

  - id: mcp_header_body_desync_denied
    cell: mcp_streamable_http_header_consistency
    principal: gateway_operator
    owasp: MCP07
    fixture:
      cwd: .
      command: ./scripts/check-mcp-protocol.sh
    expect:
      status: 0
